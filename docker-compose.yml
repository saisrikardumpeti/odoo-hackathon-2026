services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo-hackathon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: dev # <--- Crucial: Stops the build at the 'dev' stage
    container_name: go_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev # <--- Crucial: Stops the build at the 'dev' stage
    container_name: vite_frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
